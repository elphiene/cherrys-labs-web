<!doctype html>
<html lang="en-AU">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>cherry's labs — store</title>
        <meta name="description" content="cherry's labs - store" />
        <meta name="author" content="Elphiene" />
        <meta name="year" content="2026" />
        <link rel="icon" type="image/x-icon" href="../retro/images/icons/favicon.png" />
        <link rel="stylesheet" href="style.css" />
        <style>
            /* ── store page extras ── */
            .store-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
                gap: var(--spacing-md);
            }

            .product-card {
                display: flex;
                flex-direction: column;
                gap: var(--spacing-xs);
            }

            .product-card img {
                width: 100%;
                aspect-ratio: 1/1;
                object-fit: cover;
                border-radius: calc(var(--radius) / 2);
                border: 1px solid var(--border-color-white);
            }

            .product-card .price {
                font-size: var(--font-size-base);
                color: var(--color-pink);
                font-weight: bold;
            }

            .tags {
                display: flex;
                gap: var(--spacing-xs);
                flex-wrap: wrap;
            }

            .tag {
                font-size: 11px;
                padding: 2px 8px;
                border-radius: 20px;
                border: 1px solid var(--border-color-white);
                color: #ccc;
            }

            .tag.type-3dprint { border-color: var(--color-purple); color: var(--color-purple); }
            .tag.type-gadget  { border-color: var(--color-pink);   color: var(--color-pink);   }

            @media (max-width: 480px) {
                .store-grid { grid-template-columns: 1fr; }
            }
        </style>
    </head>
    <body>
        <header>
            <img src="../retro/images/logos/cherrys-labs.png" alt="cherry's labs" class="logo" />
            <nav>
                <a href="index.html">home</a>
                <a href="projects.html">projects</a>
                <a href="programs.html">programs</a>
                <a href="store.html">store</a>
                <a href="wiki.html">wiki</a>
            </nav>
        </header>

        <main>
            <section class="showcase">
                <h2>store</h2>
                <p>3D printed items and gadgets/tech. More coming soon!</p>
            </section>

            <section>
                <!-- ─────────────────────────────────────────
                     STORE GRID
                     To add a product: copy one .card.product-card block.
                     Category tags: type-3dprint / type-gadget
                ───────────────────────────────────────── -->
                <div class="store-grid">

                    <!-- PRODUCT CARD TEMPLATE
                    <div class="card product-card">
                        <img src="path/to/photo.jpg" alt="product name" />
                        <div class="tags">
                            <span class="tag type-3dprint">3d print</span>
                        </div>
                        <h3>product name</h3>
                        <p>Short description.</p>
                        <span class="price">$0.00</span>
                    </div>
                    -->

                    <div class="card product-card">
                        <div class="tags">
                            <span class="tag type-3dprint">3d print</span>
                        </div>
                        <h3>product name</h3>
                        <p>Short description of the item.</p>
                        <span class="price">$0.00</span>
                    </div>

                </div>
            </section>
        </main>

        <footer>
            <p>
                webmaster: <a href="https://elphiene.github.io/elphiene/elphiene">elphiene</a>
                | 2026 | <a href="https://cherrysofa.com">cherrysofa.com</a>
            </p>
        </footer>

        <script>
            document.addEventListener("DOMContentLoaded", () => {
                document.querySelectorAll(".card").forEach((card, i) => {
                    card.style.animationDelay = `${i * 0.1}s`;
                });
            });
        </script>
    </body>
</html>
